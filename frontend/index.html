<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoScope Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <div id="map"></div>

        <header class="app-brand glass-panel" aria-label="GeoScope Analytics">
            <img class="brand-logo" src="assets/logo.png" alt="GeoScope Analytics logo">
        </header>

        <aside id="control-panel" class="control-panel glass-panel" aria-expanded="true">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="panel-kicker">Controls</span>
                    <h2>Analysis Controls</h2>
                </div>
                <button id="toggle-controls" class="panel-toggle-button" type="button" aria-expanded="true">Hide</button>
            </div>

            <div class="control-body">
                <div class="field-group">
                    <label for="catchmentSelect"><span class="field-icon">ID</span>Catchment</label>
                    <select id="catchmentSelect">
                        <option value="">Loading catchments...</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="start-date"><span class="field-icon">FROM</span>Start date</label>
                    <input id="start-date" type="date">
                </div>

                <div class="field-group">
                    <label for="end-date"><span class="field-icon">TO</span>End date</label>
                    <input id="end-date" type="date">
                </div>

                <button id="run-analysis" class="run-button" type="button">Run Analysis</button>
                <button id="reset-analysis" class="reset-button is-hidden" type="button">Reset Analysis</button>

                <label class="toggle-row" for="toggle-burned-overlay">
                    <input id="toggle-burned-overlay" type="checkbox" checked>
                    <span>Show burned area overlay</span>
                </label>

                <div class="status-card">
                    <span class="status-dot"></span>
                    <p id="status-message">Choose filters and run the analysis.</p>
                </div>
            </div>
        </aside>

        <div class="view-toggle glass-panel" role="group" aria-label="Map and results view">
            <button id="show-map" class="view-toggle-button is-active" type="button">Map</button>
            <button id="show-results" class="view-toggle-button" type="button">Results</button>
        </div>

        <aside class="quick-stats glass-panel" aria-label="Quick stats">
            <div class="quick-stat">
                <span>Catchment</span>
                <strong id="quick-catchment">--</strong>
            </div>
            <div class="quick-stat">
                <span>Window</span>
                <strong id="quick-window">--</strong>
            </div>
            <div class="quick-stat">
                <span>Rows</span>
                <strong id="quick-records">--</strong>
            </div>
        </aside>

        <button id="results-backdrop" class="results-backdrop" type="button" aria-label="Close results panel"></button>

        <aside id="results-drawer" class="results-drawer glass-panel" aria-hidden="true">
            <div class="results-toolbar">
                <div class="results-toolbar-copy">
                    <span class="panel-kicker">Results</span>
                    <h2>Analysis Results</h2>
                </div>
                <div class="results-toolbar-actions">
                    <button id="export-csv" class="export-button" type="button">Export CSV</button>
                    <button id="close-results" class="drawer-close-button" type="button">Close</button>
                </div>
            </div>

            <div class="results-overview">
                <div class="kpi-grid">
                    <article class="kpi-card">
                        <span class="kpi-label">Avg Burned Area</span>
                        <strong id="avg-burned-area">--</strong>
                    </article>
                    <article class="kpi-card">
                        <span class="kpi-label">Avg Rainfall</span>
                        <strong id="avg-rainfall">--</strong>
                    </article>
                    <article class="kpi-card">
                        <span class="kpi-label">Land Cover</span>
                        <strong id="dominant-land-cover">--</strong>
                    </article>
                </div>
            </div>

            <div id="results-drawer-body" class="results-grid">
                <section class="results-card">
                    <div class="results-card-head">
                        <h3>Chart</h3>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="results-chart"></canvas>
                    </div>
                </section>

                <section class="results-card">
                    <div class="results-card-head">
                        <h3>Table</h3>
                    </div>
                    <div id="table-container" class="table-container">
                        <p class="placeholder">Results will appear here.</p>
                    </div>
                </section>
            </div>
        </aside>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
